kind = "web"
previewPath = "/"
title = "Luxe Parfum"
version = "1.0.0"
id = "artifacts/perfume-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20544

[services.development]
run = "pnpm --filter @workspace/perfume-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perfume-store", "run", "build" ]
publicDir = "artifacts/perfume-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20544"
BASE_PATH = "/"
